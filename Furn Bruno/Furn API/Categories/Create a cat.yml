info:
  name: Create a cat
  type: http
  seq: 4

http:
  method: POST
  url: http://localhost:5000/api/categories
  headers:
    - name: x-org-id
      value: "6"
  body:
    type: json
    data: |-
      {
        "category_name" : "some cat",
        "description" : "Think he big now"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
