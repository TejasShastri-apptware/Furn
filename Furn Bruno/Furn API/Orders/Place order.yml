info:
  name: Place order
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:5000/api/orders/place
  headers:
    - name: x-org-id
      value: "6"
    - name: x-user-id
      value: "17"
  body:
    type: json
    data: |-
      {
        "shipping_address_id": 1,
        "payment_id": "PAY_TEST_001"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
