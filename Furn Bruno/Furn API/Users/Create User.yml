info:
  name: Create User
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:5000/api/users/register
  headers:
    - name: x-org-id
      value: "6"
  body:
    type: json
    data: |-
      {
        "full_name": "customer",
        "email": "customer@furn.com",
        "password_hash": "pwordpword",
        "phone": "9876543210",
        "role_id": 3
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
