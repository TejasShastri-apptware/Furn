info:
  name: Add to cart
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:5000/api/cart/add
  headers:
    - name: x-org-id
      value: "6"
    - name: x-user-id
      value: "17"
  body:
    type: json
    data: |-
      {
        "product_id": 9,
        "quantity": 3
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
