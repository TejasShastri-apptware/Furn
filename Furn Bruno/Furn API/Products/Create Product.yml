info:
  name: Create Product
  type: http
  seq: 9

http:
  method: POST
  url: http://localhost:5000/api/products
  headers:
    - name: x-org-id
      value: "6"
  body:
    type: json
    data: |-
      {
        "category_id": 8,
        "name": "ANOTHER cupboard",
        "description": "ANOTHER comfortable cupboard for U to sleep in",
        "price": 499.99,
        "discount_price": 450.00,
        "material": "Leather",
        "color": "Brown",
        "length": 80.0,
        "width": 35.0,
        "height": 40.0,
        "stock_quantity": 10,
        "tag_ids": [7]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
