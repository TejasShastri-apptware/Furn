info:
  name: Keyword Search
  type: http
  seq: 3

http:
  method: GET
  url: http://localhost:5000/api/products/search?keyword=sofa
  headers:
    - name: x-org-id
      value: "1"
  params:
    - name: keyword
      value: sofa
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
