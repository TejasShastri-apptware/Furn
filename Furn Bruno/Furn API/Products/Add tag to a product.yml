info:
  name: Add tag to a product
  type: http
  seq: 12

http:
  method: POST
  url: http://localhost:5000/api/products/3/tags
  headers:
    - name: x-org-id
      value: "1"
  body:
    type: json
    data: |-
      {
          "tag_id": 6
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
